<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spreadsheet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-container">
    <!-- Toolbar -->
    <div id="toolbar">
      <div class="toolbar-group">
        <button data-action="undo" title="Undo (Ctrl+Z)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h10a5 5 0 0 1 5 5v0a5 5 0 0 1-5 5H8"/><path d="M7 14l-4-4 4-4"/></svg>
        </button>
        <button data-action="redo" title="Redo (Ctrl+Y)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10H11a5 5 0 0 0-5 5v0a5 5 0 0 0 5 5h5"/><path d="M17 14l4-4-4-4"/></svg>
        </button>
      </div>

      <div class="toolbar-group">
        <button data-action="bold" title="Bold (Ctrl+B)"><b>B</b></button>
        <button data-action="italic" title="Italic (Ctrl+I)"><i>I</i></button>
      </div>

      <div class="toolbar-group">
        <div class="color-picker-wrapper">
          <span class="toolbar-label">Text</span>
          <input type="color" id="text-color" value="#000000" title="Text color">
        </div>
        <div class="color-picker-wrapper">
          <span class="toolbar-label">Fill</span>
          <input type="color" id="bg-color" value="#ffffff" title="Background color">
        </div>
      </div>

      <div class="toolbar-group">
        <button data-action="align-left" title="Align left">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
        </button>
        <button data-action="align-center" title="Align center">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        </button>
        <button data-action="align-right" title="Align right">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="6" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>

      <div class="toolbar-group">
        <button data-action="freeze" title="Freeze Panes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
        </button>
        <button data-action="clear-format" title="Clear formatting">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/><line x1="4" y1="20" x2="20" y2="4" stroke-width="1.5"/></svg>
        </button>
      </div>
    </div>

    <!-- Formula Bar -->
    <div id="formula-bar">
      <div class="formula-bar-address">A1</div>
      <div class="formula-bar-fx">fx</div>
      <input type="text" class="formula-bar-input" spellcheck="false">
    </div>

    <!-- Spreadsheet Canvas -->
    <div id="spreadsheet-container">
      <canvas id="spreadsheet-canvas"></canvas>
    </div>

    <!-- Sheet Tabs -->
    <div id="sheet-tabs"></div>

    <!-- Context Menu -->
    <div id="context-menu">
      <div class="context-menu-item" data-action="cut">Cut <span class="shortcut">Ctrl+X</span></div>
      <div class="context-menu-item" data-action="copy">Copy <span class="shortcut">Ctrl+C</span></div>
      <div class="context-menu-item" data-action="paste">Paste <span class="shortcut">Ctrl+V</span></div>
      <div class="context-menu-separator"></div>
      <div class="context-menu-item" data-action="clear">Clear contents <span class="shortcut">Del</span></div>
      <div class="context-menu-separator"></div>
      <div class="context-menu-item" data-action="insert-row-above">Insert row above</div>
      <div class="context-menu-item" data-action="insert-row-below">Insert row below</div>
      <div class="context-menu-item" data-action="delete-row">Delete row</div>
      <div class="context-menu-separator"></div>
      <div class="context-menu-item" data-action="insert-col-left">Insert column left</div>
      <div class="context-menu-item" data-action="insert-col-right">Insert column right</div>
      <div class="context-menu-item" data-action="delete-col">Delete column</div>
      <div class="context-menu-separator"></div>
      <div class="context-menu-item" data-action="freeze">Freeze panes</div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
